<svg
  xmlns="http://www.w3.org/2000/svg"
  width="35"
  height="20"
  role="img"
  aria-label="CMD"
>
  <title>CMD</title>
  <g shape-rendering="crispEdges">
    <rect width="0" height="20" fill="#4d4d4d" />
    <rect x="0" width="35" height="20" fill="#4d4d4d" />
  </g>
  <g
    fill="#fff"
    text-anchor="middle"
    font-family="Verdana,Geneva,DejaVu Sans,sans-serif"
    text-rendering="geometricPrecision"
    font-size="110"
  >
    <text x="175" y="140" transform="scale(.1)" fill="#fff" textLength="250">
      CMD
    </text>
  </g>
</svg>
