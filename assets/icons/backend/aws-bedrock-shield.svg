<svg
  xmlns="http://www.w3.org/2000/svg"
  width="85"
  height="20"
  role="img"
  aria-label="AWS Bedrock"
>
  <title>AWS Bedrock</title>
  <g shape-rendering="crispEdges">
    <rect width="0" height="20" fill="#ff9900" />
    <rect x="0" width="85" height="20" fill="#ff9900" />
  </g>
  <g
    fill="#fff"
    text-anchor="middle"
    font-family="Verdana,Geneva,DejaVu Sans,sans-serif"
    text-rendering="geometricPrecision"
    font-size="110"
  >
    <text x="425" y="140" transform="scale(.1)" fill="#fff" textLength="750">
      AWS Bedrock
    </text>
  </g>
</svg>
